<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <meta name="color-scheme" content="dark" />
        <title>hellollm</title>
        <link rel="icon" href="favicon.svg" type="image/svg+xml" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <nav class="controls" aria-label="Diagram controls">
            <button id="collapse-all" type="button" title="Collapse all" aria-label="Collapse all" disabled>
                <i data-lucide="minimize-2" aria-hidden="true"></i>
            </button>
            <button id="expand-all" type="button" title="Expand all" aria-label="Expand all" disabled>
                <i data-lucide="maximize-2" aria-hidden="true"></i>
            </button>
            <button id="zoom-out" type="button" title="Zoom out" aria-label="Zoom out" disabled>
                <i data-lucide="zoom-out" aria-hidden="true"></i>
            </button>
            <button id="fit-view" type="button" title="Fit view" aria-label="Fit view" disabled>
                <i data-lucide="scan" aria-hidden="true"></i>
            </button>
            <button id="zoom-in" type="button" title="Zoom in" aria-label="Zoom in" disabled>
                <i data-lucide="zoom-in" aria-hidden="true"></i>
            </button>
        </nav>
        <main>
            <svg id="diagram" role="img" aria-label="Interactive LLM architecture diagram"></svg>
            <div id="message" class="message" hidden></div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/marked@18.0.6/lib/marked.umd.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/dompurify@3.4.12/dist/purify.min.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/elkjs@0.11.1/lib/elk.bundled.js" defer></script>
        <script src="https://cdn.jsdelivr.net/npm/lucide@1.25.0/dist/umd/lucide.min.js" defer></script>
        <script src="data.js" defer></script>
        <script src="app.js" defer></script>
    </body>
</html>
